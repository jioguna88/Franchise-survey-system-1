  /* 검색 가능한 드롭다운 */
  .searchable-dropdown { position: relative; }
  .dropdown-list {
    position: absolute; top: 100%; left: 0; right: 0;

  .dropdown-list.show { display: block; }
  .dropdown-item { padding: 10px; cursor: pointer; font-size: 14px; }
  .dropdown-item:hover { background: #e8f5e9; }
  .dropdown-item.no-result { color: #999; cursor: default; }
  
  .item-row { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; }
  .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .row-title { font-weight: bold; color: #4CAF50; }
  .row-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  
  @media (max-width: 600px) {
    .row-grid { grid-template-columns: 1fr; }
  }
  
  button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
  .btn-add { background: #2196F3; color: white; width: 100%; margin-bottom: 15px; }
  .btn-remove { background: #f44336; color: white; padding: 5px 10px; font-size: 12px; }

  .btn-add:hover { background: #1976D2; }

  #message { margin-top: 15px; padding: 12px; border-radius: 5px; text-align: center; display: none; font-weight: bold; }
  .success { background: #d4edda; color: #155724; }

  let itemCount = 0;

  // ─── 지점 드롭다운 검색 기능 ───
  const branchInput = document.getElementById('branchSearch');
  const branchList = document.getElementById('branchList');

  function renderBranchList(keyword = '') {
    const filtered = BRANCHES.filter(b => b.toLowerCase().includes(keyword.toLowerCase()));
    if (filtered.length === 0) {
      branchList.innerHTML = '<div class="dropdown-item no-result">검색 결과가 없습니다</div>';
    } else {
      branchList.innerHTML = filtered.map(b => 
        `<div class="dropdown-item" onclick="selectBranch('${b}')">${b}</div>`
      ).join('');
    }
  }

  function selectBranch(name) {
    branchInput.value = name;
    branchList.classList.remove('show');
  }

  branchInput.addEventListener('focus', () => {
    renderBranchList(branchInput.value);
    branchList.classList.add('show');
  });

  branchInput.addEventListener('input', () => {
    renderBranchList(branchInput.value);
    branchList.classList.add('show');
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.searchable-dropdown')) {
      branchList.classList.remove('show');
    }
  });

  // ─── 품목 추가/삭제 ───
  function addItem() {
    itemCount++;
    const container = document.getElementById('itemsContainer');
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
      <div class="row-header">
        <span class="row-title">품목 #${itemCount}</span>
        <button type="button" class="btn-remove" onclick="this.parentElement.parentElement.remove()">삭제</button>
      </div>
      <div class="row-grid">
        <div>
          <label>재고 구분</label>
          <select class="category" required>
            <option value="">선택</option>
            <option value="초도물량">초도물량</option>
            <option value="노쇼재고">노쇼재고</option>
            <option value="장기 미판매 재고">장기 미판매 재고</option>
          </select>
        </div>
        <div>
          <label>품목명</label>
          <input type="text" class="itemName" required>
        </div>
        <div>
          <label>수량</label>
          <input type="number" class="quantity" min="1" required>
        </div>
      </div>
    `;
    container.appendChild(div);
  }

  addItem(); // 진입 시 1개 자동 추가

  // ─── 폼 제출 ───
  document.getElementById('surveyForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const branch = branchInput.value.trim();
    if (!BRANCHES.includes(branch)) {
      showMessage('지점명을 목록에서 선택해 주세요.', 'error');
      return;
    }

    const rows = document.querySelectorAll('.item-row');
    const items = [];
    rows.forEach(row => {
      items.push({
        category: row.querySelector('.category').value,
        itemName: row.querySelector('.itemName').value,
        quantity: row.querySelector('.quantity').value
      });
    });

    if (items.length === 0) {
      showMessage('최소 1개의 품목을 입력해 주세요.', 'error');
      return;
    }

    try {
      await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ branch: branch, items: items })
      });
      showMessage(`✅ 제출 완료! ${items.length}개 품목이 등록되었습니다.`, 'success');
      document.getElementById('surveyForm').reset();
      document.getElementById('itemsContainer').innerHTML = '';
      itemCount = 0;
      addItem();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (err) {
      showMessage('제출 중 오류가 발생했습니다: ' + err.message, 'error');
    }
  });

  function showMessage(text, type) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.className = type;
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 5000);
  }
</script>

</body>
</html>
